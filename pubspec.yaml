name: aun_postman
description: "A production-grade API client for iOS — Postman in your pocket."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.11.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP Client
  dio: ^5.8.0+1
  http_parser: ^4.1.1
  mime: ^2.0.0
  web_socket_channel: ^3.0.2

  # Local Persistence (Hive — no code generation required)
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Serialization / Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Syntax Highlighting
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  xml: ^6.5.0

  # UI
  flutter_animate: ^4.5.2
  flutter_slidable: ^3.1.2

  # Utilities
  uuid: ^4.5.1
  crypto: ^3.0.6
  intl: ^0.20.2
  logger: ^2.5.0
  package_info_plus: ^8.3.0

  # File / Share
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  flutter_secure_storage: ^9.2.4

# 2.6+ uses package:objective_c (native assets); Simulator can fail to load
# objective_c.framework. 2.5.x uses the classic iOS plugin without it.
dependency_overrides:
  path_provider_foundation: 2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: Satoshi
      fonts:
        - asset: fonts/Satoshi-Light.otf
          weight: 300
        - asset: fonts/Satoshi-Regular.otf
        - asset: fonts/Satoshi-Medium.otf
          weight: 500
        - asset: fonts/Satoshi-Bold.otf
          weight: 700
        - asset: fonts/Satoshi-Black.otf
          weight: 900
        - asset: fonts/Satoshi-LightItalic.otf
          weight: 300
          style: italic
        - asset: fonts/Satoshi-Italic.otf
          style: italic
        - asset: fonts/Satoshi-MediumItalic.otf
          weight: 500
          style: italic
        - asset: fonts/Satoshi-BoldItalic.otf
          weight: 700
          style: italic
        - asset: fonts/Satoshi-BlackItalic.otf
          weight: 900
          style: italic
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
